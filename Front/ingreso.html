<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingreso | Parroquia Jesús Obrero</title>
    <meta name="description" content="Inicia sesión en tu cuenta de la Parroquia Jesús Obrero.">
    <link rel="icon" href="asset/Img/iglesia.png" type="image/x-icon">
    <link rel="stylesheet" href="asset/Css/global.css">
    <link rel="stylesheet" href="asset/Css/auth.css">
    <script defer src="asset/Js/nav.js"></script>
    <script defer src="asset/Js/ingreso.js"></script>
</head>
<body class="auth-page">

    <!-- Navbar mínima -->
    <nav class="navbar" id="main-navbar">
        <div class="navbar-container">
            <a href="index.html" class="nav-logo">
                <img src="asset/Img/iglesiafav.png" alt="Logo" class="nav-logo-img">
                <span class="nav-logo-text">Parroquia Jesús Obrero</span>
            </a>
            <div class="nav-right">
                <a href="index.html" class="btn btn-outline" style="font-size:0.88rem;padding:8px 16px;">← Volver al inicio</a>
            </div>
        </div>
    </nav>

    <div class="auth-layout">
        <!-- Panel visual izquierdo -->
        <div class="auth-visual" aria-hidden="true">
            <div class="auth-visual-overlay"></div>
            <div class="auth-visual-content">
                <img src="asset/Img/iglesiafav.png" alt="Logo" class="auth-visual-logo">
                <h2>Bienvenido de vuelta</h2>
                <p>Accede a tu comunidad parroquial, gestiona tus eventos y mantente conectado.</p>
            </div>
        </div>

        <!-- Formulario -->
        <main class="auth-form-side">
            <div class="auth-form-box">
                <div class="auth-form-header">
                    <h1>Iniciar Sesión</h1>
                    <p>Ingresa tus credenciales para acceder a tu cuenta</p>
                </div>

                <form id="login-form" class="auth-form" novalidate>
                    <div class="form-group">
                        <label for="email-input">Correo electrónico</label>
                        <div class="input-wrapper">
                            <span class="input-icon">✉️</span>
                            <input type="email" id="email-input" name="email"
                                   placeholder="correo@ejemplo.com"
                                   autocomplete="username" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password-input">Contraseña</label>
                        <div class="input-wrapper">
                            <span class="input-icon">🔒</span>
                            <input type="password" id="password-input" name="password"
                                   placeholder="Tu contraseña"
                                   autocomplete="current-password" required>
                            <button type="button" class="toggle-password" aria-label="Ver contraseña">👁</button>
                        </div>
                    </div>

                    <div id="auth-error" class="auth-error" role="alert" style="display:none;"></div>

                    <button type="submit" class="btn btn-primary btn-full auth-submit" id="login-btn">
                        Ingresar
                    </button>
                </form>

                <div class="auth-footer-links">
                    <p>¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a></p>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
